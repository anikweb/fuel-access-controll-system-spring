<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f7fa;
        }
        .card {
            background: #fff;
            padding: 3rem 4rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 { color: #2c3e50; margin: 0 0 0.5rem; }
        p  { color: #7f8c8d; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1 th:text="${message}">Hello, World!</h1>
        <p>Welcome to facs.</p>
    </div>
</body>
</html>
