spring.application.name=facs
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/facs-spring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# DB credentials read from env vars in prod (DB_USER / DB_PASSWORD); local dev falls back to defaults.
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate manages the schema (update mode — beginner-friendly).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Multipart uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Local file storage for user uploads
facs.uploads.dir=./uploads
facs.uploads.url-prefix=/uploads

# SMS provider (use "console" for dev, "bulksmsbd" for live SMS).
# In production, set FACS_SMS_API_KEY and FACS_SMS_SENDER_ID env vars; the values below are dev fallbacks.
facs.sms.provider=bulksmsbd
facs.sms.api-key=${FACS_SMS_API_KEY:oZ15IBoKANtLb8oDkQID}
facs.sms.sender-id=${FACS_SMS_SENDER_ID:8809601004489}

# OTP settings — length is digit count, expiry-seconds controls validity window, max-attempts caps brute force.
facs.otp.length=6
facs.otp.expiry-seconds=300
facs.otp.max-attempts=5