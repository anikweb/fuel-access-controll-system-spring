spring.application.name=facs
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/facs-spring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate manages the schema (update mode — beginner-friendly).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Multipart uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Local file storage for user uploads
facs.uploads.dir=./uploads
facs.uploads.url-prefix=/uploads

# SMS provider: "console" (logs OTP) or "bulksmsbd"
facs.sms.provider=console
facs.sms.api-key=oZ15IBoKANtLb8oDkQID
facs.sms.sender-id=8809601004489
facs.sms.base-url=http://bulksmsbd.net/api/smsapi
facs.sms.type=text

# OTP policy
facs.otp.length=6
facs.otp.expiry-seconds=300
